<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Upload</title>
<link href="https://releases.transloadit.com/uppy/v4.12.1/uppy.min.css" rel="stylesheet">
<style>
  :root { --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460; --text: #e4e4e7; --text-muted: #a1a1aa; --accent: #4ade80; --accent-hover: #22c55e; --error: #f87171; --border: #27272a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: 720px; padding: 24px 16px; }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .header .subtitle { color: var(--text-muted); font-size: 0.9rem; }
  .selector { margin-bottom: 16px; }
  .selector label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .selector select { width: 100%; padding: 10px 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; }
  .selector select:focus { border-color: var(--accent); }
  .selector select:disabled { opacity: 0.4; }
  .selected-info { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
  .selected-info .label { color: var(--text-muted); font-size: 0.8rem; }
  .selected-info .value { color: var(--accent); font-weight: 500; }
  #uppy-area { display: none; }
  .finish-section { text-align: center; margin-top: 16px; display: none; }
  .finish-section.visible { display: block; }
  .finish-btn { background: var(--accent); color: #000; border: none; padding: 14px 32px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
  .finish-btn:hover { background: var(--accent-hover); }
  .finish-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .finish-status { margin-top: 12px; font-size: 0.9rem; color: var(--text-muted); }
  .done-section { text-align: center; padding: 48px 16px; display: none; }
  .done-section.visible { display: block; }
  .done-section .checkmark { font-size: 3rem; margin-bottom: 16px; }
  .done-section h2 { font-size: 1.3rem; margin-bottom: 8px; color: var(--accent); }
  .done-section p { color: var(--text-muted); }
  .done-section .upload-more { margin-top: 16px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 10px 24px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; }
  .error-msg { text-align: center; padding: 48px; color: var(--error); font-size: 1.1rem; }
  .uppy-Dashboard-inner { background: var(--surface) !important; border-color: var(--border) !important; }
  .uppy-Dashboard-AddFiles { background: var(--surface) !important; border-color: var(--border) !important; }
  .uppy-DashboardContent-bar { background: var(--surface2) !important; border-color: var(--border) !important; }
  .uppy-DashboardContent-title { color: var(--text) !important; }
  .uppy-Dashboard-Item { background: var(--surface2) !important; }
  .uppy-Dashboard-Item-name { color: var(--text) !important; }
  .uppy-StatusBar { background: var(--surface2) !important; }
</style>
</head>
<body>
<div class="container" id="main-container">
  <div class="header">
    <h1>Admin Upload</h1>
    <div class="subtitle">Select a client channel and tracker item, then upload files</div>
  </div>

  <div id="selector-section">
    <div class="selector">
      <label>Client Channel</label>
      <select id="channel-select"><option value="">Loading channels...</option></select>
    </div>
    <div class="selector">
      <label>Tracker List</label>
      <select id="list-select" disabled><option value="">Select a channel first</option></select>
    </div>
    <div class="selector">
      <label>Item</label>
      <select id="item-select" disabled><option value="">Select a list first</option></select>
    </div>
  </div>

  <div id="selected-info" class="selected-info">
    <span class="label">Uploading to:</span> <span class="value" id="selected-label"></span>
  </div>

  <div id="uppy-area">
    <div id="uppy-dashboard"></div>
    <div class="finish-section" id="finish-section">
      <button class="finish-btn" id="finish-btn">Finish &amp; Save to Tracker</button>
      <div class="finish-status" id="finish-status"></div>
    </div>
  </div>

  <div class="done-section" id="done-section">
    <div class="checkmark">&#10003;</div>
    <h2>Upload Complete</h2>
    <p>Files saved to tracker.</p>
    <button class="upload-more" id="upload-more-btn">Upload More</button>
  </div>
</div>

<script src="https://releases.transloadit.com/uppy/v4.12.1/uppy.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var adminKey = params.get('key');
  if (!adminKey) {
    document.getElementById('main-container').textContent = '';
    var err = document.createElement('div');
    err.className = 'error-msg';
    err.textContent = 'Missing admin key.';
    document.getElementById('main-container').appendChild(err);
    return;
  }

  function apiUrl(path) { return path + (path.indexOf('?') >= 0 ? '&' : '?') + 'key=' + encodeURIComponent(adminKey); }

  var channelSel = document.getElementById('channel-select');
  var listSel = document.getElementById('list-select');
  var itemSel = document.getElementById('item-select');
  var uppyArea = document.getElementById('uppy-area');
  var finishSection = document.getElementById('finish-section');
  var finishBtn = document.getElementById('finish-btn');
  var finishStatus = document.getElementById('finish-status');
  var doneSection = document.getElementById('done-section');
  var selectedInfo = document.getElementById('selected-info');
  var selectedLabel = document.getElementById('selected-label');

  var uppy = null;
  var currentToken = null;
  var completedUploadIds = [];

  function clearSelect(sel, placeholder) {
    while (sel.options.length > 0) sel.remove(0);
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = placeholder;
    sel.appendChild(opt);
  }

  function addOption(sel, value, text) {
    var opt = document.createElement('option');
    opt.value = value;
    opt.textContent = text;
    sel.appendChild(opt);
  }

  // Load channels
  fetch(apiUrl('/admin/channels')).then(function(r) { return r.json(); }).then(function(data) {
    clearSelect(channelSel, '-- Select channel --');
    if (!data.ok) return;
    data.channels.forEach(function(ch) { addOption(channelSel, ch.id, '#' + ch.name); });
  });

  channelSel.addEventListener('change', function() {
    var channelId = channelSel.value;
    clearSelect(listSel, 'Loading...');
    listSel.disabled = true;
    clearSelect(itemSel, 'Select a list first');
    itemSel.disabled = true;
    hideUppy();
    if (!channelId) return;

    fetch(apiUrl('/admin/lists?channel=' + channelId)).then(function(r) { return r.json(); }).then(function(data) {
      clearSelect(listSel, '-- Select list --');
      (data.lists || []).forEach(function(l) { addOption(listSel, l.id, l.name); });
      listSel.disabled = false;
    });
  });

  listSel.addEventListener('change', function() {
    var listId = listSel.value;
    clearSelect(itemSel, 'Loading items...');
    itemSel.disabled = true;
    hideUppy();
    if (!listId) return;

    fetch(apiUrl('/admin/items?list=' + listId)).then(function(r) { return r.json(); }).then(function(data) {
      clearSelect(itemSel, '-- Select item --');
      (data.items || []).forEach(function(item) { addOption(itemSel, item.id, item.name); });
      itemSel.disabled = false;
    });
  });

  itemSel.addEventListener('change', function() {
    var itemId = itemSel.value;
    var itemName = itemSel.options[itemSel.selectedIndex] ? itemSel.options[itemSel.selectedIndex].textContent : 'Upload';
    hideUppy();
    if (!itemId) return;

    var channelId = channelSel.value;
    var listId = listSel.value;
    fetch(apiUrl('/admin/token?channel=' + channelId + '&list=' + listId + '&item=' + itemId + '&name=' + encodeURIComponent(itemName)))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.ok) return;
        currentToken = data.token;
        selectedLabel.textContent = itemName + ' in ' + (channelSel.options[channelSel.selectedIndex] ? channelSel.options[channelSel.selectedIndex].textContent : '');
        selectedInfo.style.display = 'block';
        showUppy();
      });
  });

  function hideUppy() {
    uppyArea.style.display = 'none';
    selectedInfo.style.display = 'none';
    doneSection.classList.remove('visible');
    finishSection.classList.remove('visible');
    if (uppy) { uppy.destroy(); uppy = null; }
    completedUploadIds = [];
    currentToken = null;
  }

  function showUppy() {
    uppyArea.style.display = 'block';
    completedUploadIds = [];

    uppy = new Uppy.Uppy({ restrictions: { maxNumberOfFiles: 50 }, autoProceed: true });
    uppy.use(Uppy.Dashboard, {
      target: '#uppy-dashboard', inline: true, height: 400,
      proudlyDisplayPoweredByUppy: false, showProgressDetails: true, theme: 'dark',
      note: 'Resumable uploads. Large files welcome.',
    });
    uppy.use(Uppy.Tus, {
      endpoint: '/tus/', chunkSize: 10 * 1024 * 1024,
      retryDelays: [0, 1000, 3000, 5000, 10000], removeFingerprintOnSuccess: true,
      metadata: function(file) { return { filename: file.name, filetype: file.type || 'application/octet-stream', token: currentToken }; },
    });
    uppy.on('upload-success', function(file, response) {
      var tusId = (response.uploadURL || '').split('/').pop();
      if (tusId) completedUploadIds.push(tusId);
    });
    uppy.on('complete', function() {
      if (completedUploadIds.length > 0) finishSection.classList.add('visible');
    });
  }

  finishBtn.addEventListener('click', async function() {
    if (!completedUploadIds.length || !currentToken) return;
    finishBtn.disabled = true;
    finishStatus.textContent = 'Saving to tracker...';
    try {
      var resp = await fetch('/upload/complete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: currentToken, uploadIds: completedUploadIds }),
      });
      var data = await resp.json();
      if (data.ok) {
        uppyArea.style.display = 'none';
        selectedInfo.style.display = 'none';
        doneSection.classList.add('visible');
      } else {
        finishStatus.textContent = 'Error: ' + (data.error || 'Unknown');
        finishBtn.disabled = false;
      }
    } catch (e) { finishStatus.textContent = 'Network error.'; finishBtn.disabled = false; }
  });

  document.getElementById('upload-more-btn').addEventListener('click', function() {
    doneSection.classList.remove('visible');
    itemSel.value = '';
    hideUppy();
    itemSel.disabled = false;
  });
})();
</script>
</body>
</html>
